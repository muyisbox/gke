steps:
# Environment Info
- name: alpine:3.18
  id: environment-info
  entrypoint: /bin/sh
  args:
  - -c
  - |
    echo "=== PR Terraform Plan ==="
    echo "Build ID: $BUILD_ID"
    echo "Branch: $BRANCH_NAME"
    echo "PR Number: $(_PR_NUMBER)"
    echo "Commit SHA: $SHORT_SHA"
    echo "========================="
  timeout: 60s

# Terraform Init (shared)
- id: terraform-init
  name: hashicorp/terraform:1.14
  entrypoint: /bin/sh
  args:
  - -c
  - |
    set -e
    echo "Initializing Terraform..."
    terraform init -upgrade -backend-config="prefix=terraform/state"
  timeout: 300s

###################
# GITOPS WORKSPACE - PLAN
###################

- id: setup-gitops-plan
  name: hashicorp/terraform:1.14
  entrypoint: /bin/sh
  waitFor:
  - terraform-init
  args:
  - -c
  - |
    workspace_name="gitops"
    echo "Selecting workspace: $workspace_name"
    terraform workspace select $workspace_name || terraform workspace new $workspace_name
    terraform workspace show
  timeout: 300s

- id: plan-gitops
  name: hashicorp/terraform:1.14
  entrypoint: /bin/sh
  waitFor:
  - setup-gitops-plan
  args:
  - -c
  - |
    set -euo pipefail
    workspace_name="gitops"
    plan_output="/workspace/plan_${workspace_name}.txt"

    echo "================================"
    echo "PLANNING workspace: $workspace_name"
    echo "================================"

    terraform workspace select $workspace_name

    # Run plan and capture output
    if terraform plan -no-color -out=/workspace/tfplan_${workspace_name} | tee "$plan_output"; then
        echo ""
        echo "✓ Plan successful for workspace: $workspace_name"

        # Check if there are changes
        if grep -q "No changes" "$plan_output"; then
            echo "STATUS: No changes detected"
        else
            echo "STATUS: Changes detected"
        fi
    else
        echo "✗ Plan failed for workspace: $workspace_name"
        exit 1
    fi
  timeout: 600s

###################
# DEV WORKSPACE - PLAN
###################

- id: setup-dev-plan
  name: hashicorp/terraform:1.14
  entrypoint: /bin/sh
  waitFor:
  - plan-gitops
  args:
  - -c
  - |
    workspace_name="dev"
    echo "Selecting workspace: $workspace_name"
    terraform workspace select $workspace_name || terraform workspace new $workspace_name
    terraform workspace show
  timeout: 300s

- id: plan-dev
  name: hashicorp/terraform:1.14
  entrypoint: /bin/sh
  waitFor:
  - setup-dev-plan
  args:
  - -c
  - |
    set -euo pipefail
    workspace_name="dev"
    plan_output="/workspace/plan_${workspace_name}.txt"

    echo "================================"
    echo "PLANNING workspace: $workspace_name"
    echo "================================"

    terraform workspace select $workspace_name

    # Run plan and capture output
    if terraform plan -no-color -out=/workspace/tfplan_${workspace_name} | tee "$plan_output"; then
        echo ""
        echo "✓ Plan successful for workspace: $workspace_name"

        # Check if there are changes
        if grep -q "No changes" "$plan_output"; then
            echo "STATUS: No changes detected"
        else
            echo "STATUS: Changes detected"
        fi
    else
        echo "✗ Plan failed for workspace: $workspace_name"
        exit 1
    fi
  timeout: 600s

###################
# STAGING WORKSPACE - PLAN
###################

- id: setup-staging-plan
  name: hashicorp/terraform:1.14
  entrypoint: /bin/sh
  waitFor:
  - plan-dev
  args:
  - -c
  - |
    workspace_name="staging"
    echo "Selecting workspace: $workspace_name"
    terraform workspace select $workspace_name || terraform workspace new $workspace_name
    terraform workspace show
  timeout: 300s

- id: plan-staging
  name: hashicorp/terraform:1.14
  entrypoint: /bin/sh
  waitFor:
  - setup-staging-plan
  args:
  - -c
  - |
    set -euo pipefail
    workspace_name="staging"
    plan_output="/workspace/plan_${workspace_name}.txt"

    echo "================================"
    echo "PLANNING workspace: $workspace_name"
    echo "================================"

    terraform workspace select $workspace_name

    # Run plan and capture output
    if terraform plan -no-color -out=/workspace/tfplan_${workspace_name} | tee "$plan_output"; then
        echo ""
        echo "✓ Plan successful for workspace: $workspace_name"

        # Check if there are changes
        if grep -q "No changes" "$plan_output"; then
            echo "STATUS: No changes detected"
        else
            echo "STATUS: Changes detected"
        fi
    else
        echo "✗ Plan failed for workspace: $workspace_name"
        exit 1
    fi
  timeout: 600s

###################
# SUMMARY & PR COMMENT
###################

- id: generate-summary
  name: alpine:3.18
  entrypoint: /bin/sh
  waitFor:
  - plan-gitops
  - plan-dev
  - plan-staging
  args:
  - -c
  - |
    echo "================================"
    echo "Plan Summary"
    echo "================================"

    for workspace in gitops dev staging; do
        plan_file="/workspace/plan_${workspace}.txt"

        echo ""
        echo "--- Workspace: $workspace ---"

        if [ -f "$plan_file" ]; then
            # Extract summary line
            if grep -q "No changes" "$plan_file"; then
                echo "✓ No changes"
            elif grep -q "Plan:" "$plan_file"; then
                grep "Plan:" "$plan_file" | head -1
            else
                echo "✓ Plan completed"
            fi
        else
            echo "✗ Plan file not found"
        fi
    done

    echo ""
    echo "================================"
    echo "Review the detailed plans above"
    echo "================================"
  timeout: 60s

# Post plan summary to PR comment
- id: post-pr-comment
  name: gcr.io/cloud-builders/gcloud
  entrypoint: bash
  waitFor:
  - generate-summary
  secretEnv: ['GITHUB_TOKEN']
  args:
  - -c
  - |
    # Skip if not a PR
    if [ -z "${_PR_NUMBER}" ] || [ "${_PR_NUMBER}" = "" ]; then
        echo "Not a PR build, skipping comment posting"
        exit 0
    fi

    # Skip if GitHub token not configured
    if [ -z "$GITHUB_TOKEN" ]; then
        echo "⚠️  GITHUB_TOKEN not configured"
        echo "To enable PR comments:"
        echo "1. Create GitHub Personal Access Token with 'repo' scope"
        echo "2. Store in Secret Manager: gcloud secrets create github-token --data-file=-"
        echo "3. Grant Cloud Build access: gcloud secrets add-iam-policy-binding github-token \\"
        echo "     --member=serviceAccount:PROJECT_NUMBER@cloudbuild.gserviceaccount.com \\"
        echo "     --role=roles/secretmanager.secretAccessor"
        echo ""
        echo "Skipping PR comment for now..."
        exit 0
    fi

    # Install jq if not available
    if ! command -v jq &> /dev/null; then
        echo "Installing jq..."
        apt-get update && apt-get install -y jq
    fi

    # Run the post-plan script
    chmod +x scripts/post-plan-to-pr.sh
    ./scripts/post-plan-to-pr.sh "${_PR_NUMBER}"
  timeout: 120s

availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/github-token/versions/latest
    env: 'GITHUB_TOKEN'

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PR_NUMBER: ""

timeout: 2400s
