steps:
# Environment Info
- name: alpine:3.18
  id: environment-info
  entrypoint: /bin/sh
  args:
  - -c
  - |
    echo "=== Build Environment Information ==="
    echo "Build ID: $BUILD_ID"
    echo "Branch Name: $BRANCH_NAME"
    echo "Pull Request: ${_PR_NUMBER:-N/A}"
    echo "Project ID: $PROJECT_ID"
    echo "Commit SHA: ${COMMIT_SHA:-N/A}"
    echo "=================================="
    echo "BUILD_START=$(date -Iseconds)" > $BUILD_ID-status.env
  timeout: 60s

# Security Scanning Steps
- name: ghcr.io/aquasecurity/trivy:latest
  id: trivy-fs-scan
  entrypoint: trivy
  args:
  - 'fs'
  - '--format'
  - 'sarif'
  - '--output'
  - 'trivy-fs-results.sarif'
  - '--severity'
  - 'HIGH,CRITICAL'
  - '--exit-code'
  - '0'
  - '.'
  env:
  - 'TRIVY_CACHE_DIR=/workspace/.trivy-cache'
  timeout: 300s

- name: ghcr.io/aquasecurity/trivy:latest
  id: trivy-config-scan
  entrypoint: trivy
  args:
  - 'config'
  - '--format'
  - 'table'
  - '--exit-code'
  - '0'
  - '--severity'
  - 'HIGH,CRITICAL'
  - '--ignorefile'
  - '.trivyignore'
  - '.'
  env:
  - 'TRIVY_CACHE_DIR=/workspace/.trivy-cache'
  timeout: 300s

- name: bridgecrew/checkov:latest
  id: checkov-scan
  entrypoint: checkov
  args:
  - '--directory'
  - '.'
  - '--framework'
  - 'terraform'
  - '--output'
  - 'cli'
  - '--soft-fail'
  - '--compact'
  timeout: 300s

- name: python:3.11-alpine
  id: security-report
  entrypoint: python3
  args:
  - -c
  - |
    import json, os, sys
    from pathlib import Path

    print("=== Security Scan Summary ===")
    issues_found = False

    trivy_fs = Path("trivy-fs-results.sarif")
    if trivy_fs.exists():
        print("Trivy filesystem scan completed")
        with open(trivy_fs) as f:
            data = json.load(f)
            if data.get("runs", [{}])[0].get("results"):
                issues_found = True
                print("WARNING: Trivy found security issues")
    else:
        print("WARNING: Trivy filesystem scan results not found")

    status = "FAILED" if issues_found else "PASSED"
    with open(f"{os.environ.get('BUILD_ID', 'build')}-status.env", "a") as f:
        f.write(f"SECURITY_SCAN_STATUS={status}\n")

    print(f"Security scan status: {status}")
    if issues_found:
        print("Critical security issues found - see scan results above")
        sys.exit(1)
    else:
        print("No critical security issues found")
  timeout: 120s

###################
# GITOPS WORKSPACE
###################

- id: setup-gitops
  name: hashicorp/terraform:1.14
  waitFor:
  - security-report
  entrypoint: /bin/sh
  secretEnv:
  - GOOGLE_CREDENTIALS
  args:
  - -c
  - |
    if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ] || [ -n "${_PR_NUMBER:-}" ]; then
        set -euo pipefail
        echo "Initializing Terraform..."
        terraform init -reconfigure -upgrade -input=false
        terraform workspace select gitops || terraform workspace new gitops
        echo "Running Terraform validation..."
        terraform validate
    else
        echo "Skipping setup on branch $BRANCH_NAME"
        exit 0
    fi
  timeout: 600s

- id: plan-gitops
  name: hashicorp/terraform:1.14
  waitFor:
  - setup-gitops
  entrypoint: /bin/sh
  secretEnv:
  - GOOGLE_CREDENTIALS
  args:
  - -c
  - |
    if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ] || [ -n "${_PR_NUMBER:-}" ]; then
        set -euo pipefail
        terraform workspace select gitops
        plan_file="/workspace/$BUILD_ID/tfplan_gitops"
        plan_output="/tmp/plan_output_gitops.txt"
        mkdir -p "$(dirname "$plan_file")"

        set +eo pipefail
        terraform plan \
            -detailed-exitcode \
            -parallelism=30 \
            -var="project_id=$PROJECT_ID" \
            -out="$plan_file" \
            > "$plan_output" 2>&1; plan_exit_code=$?
        cat "$plan_output"
        set -e

        case $plan_exit_code in
            0) echo "No changes detected" ;;
            1) echo "Plan failed"; exit 1 ;;
            2)
                echo "Plan succeeded with changes"
                terraform show -json "$plan_file" > "${plan_file}.json"
                ;;
        esac
        exit 0
    else
        echo "Skipping plan on branch $BRANCH_NAME"
    fi
  timeout: 1200s

- id: summarize-gitops
  name: ghcr.io/dineshba/tf-summarize:latest
  waitFor:
  - plan-gitops
  entrypoint: /bin/sh
  args:
  - -c
  - |
    json_file="/workspace/$BUILD_ID/tfplan_gitops.json"
    if [ -f "$json_file" ]; then
        echo "=== Plan Summary: gitops ==="
        tf-summarize "$json_file"
        echo "============================"
    else
        echo "No changes detected for gitops"
    fi
  timeout: 120s

- id: apply-gitops
  name: hashicorp/terraform:1.14
  waitFor:
  - summarize-gitops
  entrypoint: /bin/sh
  secretEnv:
  - GOOGLE_CREDENTIALS
  args:
  - -c
  - |
    if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ]; then
        set -euo pipefail
        terraform init -reconfigure -upgrade -input=false
        terraform workspace select gitops
        plan_file="/workspace/$BUILD_ID/tfplan_gitops"

        if [ ! -f "$plan_file" ]; then
            echo "Error: Plan file not found: $plan_file"
            exit 1
        fi

        echo "Creating state backup..."
        terraform state pull > "/tmp/terraform_gitops_backup_${BUILD_ID}.tfstate"

        echo "Starting Terraform apply..."
        start_time=$(date +%s)
        if terraform apply -parallelism=30 -auto-approve -input=false "$plan_file"; then
            end_time=$(date +%s)
            duration=$((end_time - start_time))
            echo "Apply completed successfully in $duration seconds"
            echo "APPLY_STATUS_GITOPS=SUCCESS" >> $BUILD_ID-status.env
        else
            echo "Apply failed for workspace: gitops"
            echo "APPLY_STATUS_GITOPS=FAILED" >> $BUILD_ID-status.env
            exit 1
        fi
    else
        echo "Skipping apply on branch $BRANCH_NAME (only runs on main/master)"
    fi
  timeout: 2400s

