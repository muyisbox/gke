steps:
# Environment Info
- name: alpine:3.21
  id: environment-info
  entrypoint: /bin/sh
  args:
  - -c
  - |
    echo "=== Build Environment Information ==="
    echo "Build ID: $BUILD_ID"
    echo "Branch Name: $BRANCH_NAME"
    echo "Pull Request: ${_PR_NUMBER:-N/A}"
    echo "Project ID: $PROJECT_ID"
    echo "Commit SHA: ${COMMIT_SHA:-N/A}"
    echo "Workspaces: ${_WORKSPACES}"
    echo "=================================="
    echo "BUILD_START=$(date -Iseconds)" > $BUILD_ID-status.env
  timeout: 60s

# Security Scanning Steps
- name: ghcr.io/aquasecurity/trivy:latest
  id: trivy-fs-scan
  entrypoint: trivy
  args:
  - 'fs'
  - '--format'
  - 'sarif'
  - '--output'
  - 'trivy-fs-results.sarif'
  - '--severity'
  - 'HIGH,CRITICAL'
  - '--exit-code'
  - '0'
  - '.'
  env:
  - 'TRIVY_CACHE_DIR=/workspace/.trivy-cache'
  timeout: 300s

- name: ghcr.io/aquasecurity/trivy:latest
  id: trivy-config-scan
  entrypoint: trivy
  args:
  - 'config'
  - '--format'
  - 'table'
  - '--exit-code'
  - '0'
  - '--severity'
  - 'HIGH,CRITICAL'
  - '--ignorefile'
  - '.trivyignore'
  - '.'
  env:
  - 'TRIVY_CACHE_DIR=/workspace/.trivy-cache'
  timeout: 300s

- name: bridgecrew/checkov:latest
  id: checkov-scan
  entrypoint: checkov
  args:
  - '--directory'
  - '.'
  - '--framework'
  - 'terraform'
  - '--output'
  - 'cli'
  - '--soft-fail'
  - '--compact'
  timeout: 300s

- name: python:3.11-alpine
  id: security-report
  entrypoint: python3
  args:
  - -c
  - |
    import json, os, sys
    from pathlib import Path

    print("=== Security Scan Summary ===")
    issues_found = False

    trivy_fs = Path("trivy-fs-results.sarif")
    if trivy_fs.exists():
        print("Trivy filesystem scan completed")
        with open(trivy_fs) as f:
            data = json.load(f)
            if data.get("runs", [{}])[0].get("results"):
                issues_found = True
                print("WARNING: Trivy found security issues")
    else:
        print("WARNING: Trivy filesystem scan results not found")

    status = "FAILED" if issues_found else "PASSED"
    with open(f"{os.environ.get('BUILD_ID', 'build')}-status.env", "a") as f:
        f.write(f"SECURITY_SCAN_STATUS={status}\n")

    print(f"Security scan status: {status}")
    if issues_found:
        print("Critical security issues found - see scan results above")
        sys.exit(1)
    else:
        print("No critical security issues found")
  timeout: 120s

###################
# PLAN ALL WORKSPACES
# Runs gitops first (owns shared network), then remaining workspaces in order.
# To add a new workspace, update _WORKSPACES in the substitutions section below.
###################

- id: plan-all
  name: hashicorp/terraform:1.14
  waitFor:
  - security-report
  entrypoint: /bin/sh
  secretEnv:
  - GOOGLE_CREDENTIALS
  args:
  - -c
  - |
    if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ] || [ -n "${_PR_NUMBER:-}" ]; then
        set -euo pipefail
        echo "Initializing Terraform..."
        terraform init -reconfigure -upgrade -input=false
        terraform validate

        mkdir -p "/workspace/$BUILD_ID"

        for ws in ${_WORKSPACES}; do
            echo "================================"
            echo "PLANNING workspace: $ws"
            echo "================================"
            terraform workspace select "$ws" || terraform workspace new "$ws"

            plan_file="/workspace/$BUILD_ID/tfplan_${ws}"
            plan_output="/tmp/plan_output_${ws}.txt"

            set +eo pipefail
            terraform plan \
                -detailed-exitcode \
                -parallelism=30 \
                -var="project_id=$PROJECT_ID" \
                -out="$plan_file" \
                > "$plan_output" 2>&1; plan_exit_code=$?
            cat "$plan_output"
            set -e

            case $plan_exit_code in
                0) echo "No changes detected for $ws" ;;
                1) echo "Plan failed for $ws"; exit 1 ;;
                2)
                    echo "Plan succeeded with changes for $ws"
                    terraform show -json "$plan_file" > "${plan_file}.json"
                    ;;
            esac
        done
    else
        echo "Skipping plan on branch $BRANCH_NAME"
    fi
  timeout: 3600s

###################
# SUMMARIZE ALL WORKSPACES
###################

- id: summarize-all
  name: ghcr.io/dineshba/tf-summarize:latest
  waitFor:
  - plan-all
  entrypoint: /bin/sh
  args:
  - -c
  - |
    for ws in ${_WORKSPACES}; do
        json_file="/workspace/$BUILD_ID/tfplan_${ws}.json"
        if [ -f "$json_file" ]; then
            echo "=== Plan Summary: $ws ==="
            tf-summarize "$json_file"
            echo "=========================="
        else
            echo "No changes detected for $ws"
        fi
    done
  timeout: 120s

###################
# APPLY ALL WORKSPACES
# gitops first (shared network), then remaining workspaces in order.
###################

- id: apply-all
  name: hashicorp/terraform:1.14
  waitFor:
  - summarize-all
  entrypoint: /bin/sh
  secretEnv:
  - GOOGLE_CREDENTIALS
  args:
  - -c
  - |
    if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ]; then
        set -euo pipefail
        terraform init -reconfigure -upgrade -input=false

        for ws in ${_WORKSPACES}; do
            echo "================================"
            echo "APPLYING workspace: $ws"
            echo "================================"
            terraform workspace select "$ws"

            plan_file="/workspace/$BUILD_ID/tfplan_${ws}"
            if [ ! -f "$plan_file" ]; then
                echo "No plan file for $ws (no changes), skipping apply"
                continue
            fi

            echo "Creating state backup..."
            terraform state pull > "/tmp/terraform_${ws}_backup_${BUILD_ID}.tfstate"

            start_time=$(date +%s)
            if terraform apply -parallelism=30 -auto-approve -input=false "$plan_file"; then
                end_time=$(date +%s)
                echo "Apply completed for $ws in $((end_time - start_time))s"
                echo "APPLY_STATUS_$(echo $ws | tr '[:lower:]' '[:upper:]')=SUCCESS" >> $BUILD_ID-status.env
            else
                echo "Apply failed for workspace: $ws"
                echo "APPLY_STATUS_$(echo $ws | tr '[:lower:]' '[:upper:]')=FAILED" >> $BUILD_ID-status.env
                exit 1
            fi
        done
    else
        echo "Skipping apply on branch $BRANCH_NAME (only runs on main/master)"
    fi
  timeout: 7200s

###################
# BUILD SUMMARY
###################

- name: alpine:3.21
  id: build-summary
  entrypoint: /bin/sh
  waitFor:
  - apply-all
  args:
  - -c
  - |
    echo "=== Build Summary ==="
    if [ -f "$BUILD_ID-status.env" ]; then
        cat $BUILD_ID-status.env
    fi
    echo "BUILD_END=$(date -Iseconds)" >> $BUILD_ID-status.env
    echo "Build completed at $(date)"
    echo "===================="
    touch $BUILD_ID-plan-summary.txt
  timeout: 60s

timeout: 7200s
options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
  logStreamingOption: STREAM_ON
  machineType: E2_HIGHCPU_8
substitutions:
  _PR_NUMBER: ''
  _TERRAFORM_VERSION: '1.14'
  # Space-separated list of workspaces to plan/apply, in order.
  # gitops must be first (it owns the shared network).
  # To add a new environment, add its workspace name here.
  _WORKSPACES: gitops dev staging
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/terraform-service-account/versions/latest
    env: GOOGLE_CREDENTIALS
artifacts:
  objects:
    location: gs://$PROJECT_ID-terraform/build-artifacts
    paths:
    - $BUILD_ID-status.env
    - $BUILD_ID-plan-summary.txt
