name: cert-manager
chart: cert-manager
repoURL: https://charts.jetstack.io
targetRevision: "1.20.0"
namespace: cert-manager
cluster_env: gitops
helm:
  values:
    crds:
      enabled: true
    replicaCount: 2
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
        labels:
          release: prometheus-monitoring
