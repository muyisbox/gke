name: istio-ingressgateway
chart: gateway
repoURL: https://istio-release.storage.googleapis.com/charts
targetRevision: "1.29.*"
namespace: istio-gateways
cluster_env: gitops
helm:
  values:
    revision: "1-29"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
    service:
      type: LoadBalancer
      ports:
        - name: status-port
          port: 15021
          protocol: TCP
          targetPort: 15021
        - name: http2
          port: 80
          protocol: TCP
          targetPort: 80
        - name: https
          port: 443
          protocol: TCP
          targetPort: 443
