---
# Loki standalone chart values (migrated from deprecated loki-stack)
deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 0

read:
  replicas: 1

write:
  replicas: 1

backend:
  replicas: 1

gateway:
  replicas: 1

# Disable components not needed for simple deployments
chunksCache:
  enabled: false
resultsCache:
  enabled: false

monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus-monitoring
